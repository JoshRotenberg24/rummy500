<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rummy 500</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --felt:#1a3a2a;--felt-l:#1e4330;--felt-d:#112218;
  --gold:#c9a84c;--gold-l:#e8c96a;--cream:#f5f0e8;
  --card:#fdfaf4;--red:#c0392b;--blk:#1a1a1a;
  --muted:#8aaa95;--hit:#2ecc71;--err:#e74c3c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--felt-d);color:var(--cream);
  height:100%;overflow:hidden;position:fixed;inset:0}

/* ── SCREENS ── */
.screen{display:none;width:100%;height:100%;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ── PARTICLE CANVAS ── */
#fx-canvas{position:fixed;inset:0;pointer-events:none;z-index:999;width:100%;height:100%}

/* ── FLOATING SCORE POPUP ── */
.score-pop{position:fixed;font-family:'Playfair Display',serif;font-weight:900;font-size:1.6rem;
  color:var(--gold-l);text-shadow:0 0 20px rgba(201,168,76,.8);pointer-events:none;z-index:998;
  animation:scorePop .9s ease forwards}
@keyframes scorePop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.4)}}
.score-pop.big{font-size:2.2rem;color:#fff;text-shadow:0 0 30px var(--gold)}
.score-pop.red{color:#ff6b6b;text-shadow:0 0 20px rgba(231,76,60,.8)}

/* ── COMBO BANNER ── */
.combo-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Playfair Display',serif;font-weight:900;font-size:2rem;color:#fff;
  text-shadow:0 0 40px var(--gold),0 0 80px rgba(201,168,76,.4);
  pointer-events:none;z-index:997;text-align:center;
  animation:comboBurst .8s cubic-bezier(.36,.07,.19,.97) forwards}
@keyframes comboBurst{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
  60%{transform:translate(-50%,-50%) scale(.95)}
  80%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.05)}
}
.combo-sub{font-size:.9rem;font-style:italic;color:var(--gold-l);margin-top:4px}

/* ── SCREEN SHAKE ── */
@keyframes shake{
  0%,100%{transform:translate(0,0)}
  10%{transform:translate(-4px,2px)}
  20%{transform:translate(4px,-2px)}
  30%{transform:translate(-3px,3px)}
  40%{transform:translate(3px,-1px)}
  50%{transform:translate(-2px,2px)}
  60%{transform:translate(2px,-2px)}
  70%{transform:translate(-1px,1px)}
  80%{transform:translate(1px,-1px)}
}
body.shake{animation:shake .3s ease}

/* ── PULSE BACKGROUND ── */
@keyframes bgPulse{0%{background-color:var(--felt)}50%{background-color:#1e4a33}100%{background-color:var(--felt)}}
#game-screen.pulse{animation:bgPulse .5s ease}

/* ── LOBBY ── */
.logo{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:900;color:var(--gold);
  text-shadow:0 0 40px rgba(201,168,76,.5),0 2px 10px rgba(0,0,0,.4);
  letter-spacing:3px;text-align:center;line-height:1;animation:logoIn .5s ease both}
.logo-sub{font-style:italic;font-size:1rem;color:var(--muted);letter-spacing:5px;text-align:center;
  margin-top:4px;margin-bottom:24px;animation:logoIn .5s .1s ease both}
@keyframes logoIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.lobby-sec{width:100%;max-width:340px;margin-bottom:10px}
.lobby-sec-title{font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:8px}
.name-row{display:flex;gap:8px;justify-content:center;margin-bottom:4px}
.name-input{background:rgba(0,0,0,.3);border:1px solid rgba(201,168,76,.3);border-radius:4px;
  color:var(--cream);font-family:'Crimson Pro',serif;font-size:.9rem;padding:7px 10px;
  width:150px;text-align:center;outline:none;transition:border-color .2s}
.name-input:focus{border-color:var(--gold)}
.name-input::placeholder{color:var(--muted);font-style:italic}
.pbtn{display:block;width:100%;max-width:340px;padding:14px 20px;margin:6px 0;
  background:linear-gradient(135deg,var(--felt-l),var(--felt));
  border:1px solid var(--gold);border-radius:6px;color:var(--gold);
  font-family:'Playfair Display',serif;font-size:.92rem;font-weight:700;letter-spacing:.5px;
  cursor:pointer;transition:all .18s;text-align:center;
  box-shadow:0 4px 16px rgba(0,0,0,.35),inset 0 1px 0 rgba(201,168,76,.15)}
.pbtn:active{transform:scale(.97);background:rgba(201,168,76,.12)}
.pbtn.hi{border-color:var(--gold-l);background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(201,168,76,.06));
  box-shadow:0 4px 24px rgba(201,168,76,.3),inset 0 1px 0 rgba(201,168,76,.3)}
.pbtn.sec{border-color:var(--muted);color:var(--muted);font-size:.8rem}
.wait{font-style:italic;color:var(--muted);font-size:.88rem;text-align:center;margin-top:12px;animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
.divider{width:50px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent);margin:10px auto}
.pat-pick{display:flex;gap:12px;justify-content:center}
.pat-opt{width:50px;height:50px;border-radius:8px;border:3px solid transparent;cursor:pointer;
  transition:all .2s;flex-shrink:0;position:relative}
.pat-opt.sel{border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.6);transform:scale(1.12)}
.pat-opt::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.95);font-size:1.1rem;opacity:0;transition:opacity .2s;font-weight:900;
  text-shadow:0 1px 3px rgba(0,0,0,.5)}
.pat-opt.sel::after{opacity:1}

/* ── GAME HEADER ── */
#game-screen{padding:0;justify-content:flex-start;background:var(--felt);overflow:hidden}
.hdr{width:100%;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,0,0,.42);border-bottom:1px solid rgba(201,168,76,.25);flex-shrink:0;gap:6px}
.score-blk{font-family:'Playfair Display',serif;text-align:center;min-width:68px}
.score-name{color:var(--muted);font-size:.62rem;letter-spacing:1px;text-transform:uppercase}
.score-val{color:var(--gold);font-size:1.5rem;font-weight:700;display:inline-block}
.score-val.bump{animation:scoreBump .4s ease}
@keyframes scoreBump{0%{transform:scale(1)}35%{transform:scale(1.6);color:var(--gold-l)}100%{transform:scale(1)}}
.prog-bar{width:100%;height:5px;background:rgba(255,255,255,.08);border-radius:3px;margin-top:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1);background:linear-gradient(90deg,var(--gold),var(--gold-l))}
.prog-fill.danger{background:linear-gradient(90deg,#e74c3c,#ff6b6b);animation:dangerPulse 1s infinite}
@keyframes dangerPulse{0%,100%{opacity:1}50%{opacity:.6}}
.turn-ind{font-style:italic;font-size:.8rem;color:var(--muted);text-align:center;padding:0 2px;flex:1;transition:color .3s}
.turn-ind.mine{color:var(--gold-l);animation:blink 1.4s infinite}
.round-badge{font-size:.6rem;letter-spacing:1px;color:var(--muted);text-align:center;margin-top:1px}
.streak-badge{font-family:'Playfair Display',serif;font-size:.65rem;font-weight:700;color:#fff;
  background:linear-gradient(135deg,#e74c3c,#c0392b);border-radius:10px;padding:2px 7px;
  display:none;animation:badgePop .3s ease;white-space:nowrap}
@keyframes badgePop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}

/* ── GAME BODY ── */
.gbody{flex:1;width:100%;display:flex;flex-direction:column;overflow:hidden;
  padding:6px 8px;gap:6px}
.zone{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:7px 10px;flex-shrink:0}
.zone.mine{border-color:rgba(201,168,76,.2);background:rgba(0,0,0,.28)}
.zlabel{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;
  display:flex;align-items:center;gap:6px}
.backs-row{display:flex;gap:3px;flex-wrap:wrap}
.deck-warn{font-size:.6rem;color:#e74c3c;font-style:italic;animation:blink .9s infinite}

/* ── PILE AREA ── */
.pile-area{display:flex;gap:10px;align-items:flex-start;justify-content:center;
  padding:7px 10px;background:rgba(0,0,0,.16);border-radius:8px;border:1px solid rgba(255,255,255,.05);flex-shrink:0}
.pile-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.plbl{font-size:.56rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.pcnt{font-size:.6rem;color:var(--muted)}
.draw-wrap{cursor:pointer;transition:transform .12s,filter .12s;position:relative}
.draw-wrap:active{transform:scale(.93)}
.draw-wrap.ready{filter:brightness(1.2);box-shadow:0 0 18px rgba(201,168,76,.45)}
.draw-wrap.ready::after{content:'DRAW';position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
  font-size:.48rem;letter-spacing:1px;color:var(--gold);animation:blink 1.1s infinite;white-space:nowrap}
.disc-row{display:flex;gap:2px;flex-wrap:nowrap;justify-content:center;max-width:190px;overflow:hidden}
.hist-row{display:flex;gap:2px;flex-wrap:wrap;margin-top:3px;opacity:.5}

/* ── MELDS ── */
.melds-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px;min-height:16px}
.meld-grp{display:flex;gap:2px;background:rgba(0,0,0,.28);padding:4px 4px 2px;border-radius:5px;
  border:1px solid rgba(201,168,76,.15);flex-wrap:wrap;cursor:pointer;
  transition:border-color .18s,box-shadow .18s,transform .12s;align-items:flex-end}
.meld-grp:active{transform:scale(.96)}
.meld-grp.tgt{border-color:var(--gold);box-shadow:0 0 10px rgba(201,168,76,.4)}
.meld-grp.compat{border-color:#2ecc71;box-shadow:0 0 10px rgba(46,204,113,.4),0 0 20px rgba(46,204,113,.15)}
.meld-who{width:100%;font-size:.5rem;color:var(--muted);text-align:center;margin-top:1px}
@keyframes meldFlash{
  0%{box-shadow:0 0 0 rgba(46,204,113,0);transform:scale(1)}
  30%{box-shadow:0 0 30px rgba(46,204,113,.9),0 0 60px rgba(46,204,113,.4);transform:scale(1.04)}
  100%{box-shadow:0 0 0 rgba(46,204,113,0);transform:scale(1)}
}
.meld-grp.flash{animation:meldFlash .6s ease}

/* ── CARDS ── */
.card{width:clamp(36px,calc((100vw - 72px) / 7),52px);
  height:calc(clamp(36px,calc((100vw - 72px) / 7),52px) * 1.44);
  background:var(--card);border:1.5px solid #d8d0c0;border-radius:5px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:700;cursor:pointer;
  transition:transform .13s,box-shadow .13s,border-color .13s;
  position:relative;flex-shrink:0;user-select:none;
  box-shadow:1px 3px 8px rgba(0,0,0,.32);line-height:1}
.card.red{color:var(--red)}.card.blk{color:var(--blk)}
.card.sel{transform:translateY(-14px);box-shadow:0 12px 26px rgba(201,168,76,.55);border-color:var(--gold);z-index:10}
.card.valid-sel{border-color:#2ecc71;box-shadow:0 12px 26px rgba(46,204,113,.5),0 0 0 2px rgba(46,204,113,.3);transform:translateY(-14px);z-index:10}
.card:active{transform:scale(.94)}
.card.sel:active,.card.valid-sel:active{transform:translateY(-14px) scale(.94)}
.card .suit{font-size:clamp(.68rem,2vw,1.1rem)}
.card .rank{font-size:clamp(.5rem,1.5vw,.76rem);position:absolute;top:3px;left:3px}
/* Staggered deal animation */
.card.deal{animation:dealIn .3s ease both}
@keyframes dealIn{from{opacity:0;transform:translateY(-20px) scale(.8) rotate(-5deg)}to{opacity:1;transform:none}}
.card.popin{animation:cardPop .22s ease}
@keyframes cardPop{0%{transform:scale(.55) translateY(12px);opacity:0}60%{transform:scale(1.1) translateY(-3px)}100%{transform:scale(1);opacity:1}}
.card.sel.popin{animation:cardPopSel .22s ease forwards}
@keyframes cardPopSel{0%{transform:scale(.55) translateY(12px);opacity:0}60%{transform:scale(1.1) translateY(-18px)}100%{transform:translateY(-14px);opacity:1}}
/* Card shine on meld */
.card.shine::after{content:'';position:absolute;inset:0;border-radius:5px;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.7) 50%,transparent 70%);
  animation:cardShine .4s ease forwards}
@keyframes cardShine{0%{background-position:-100% 0}100%{background-position:200% 0;opacity:0}}
.card.drag-ghost{opacity:.35;outline:2px dashed var(--gold);outline-offset:2px}
.card.drag-target{outline:2px solid var(--hit);outline-offset:2px;transform:scale(1.06)}

.card-sm{width:34px;height:50px}
.card-sm .rank{font-size:.52rem;top:2px;left:3px}
.card-sm .suit{font-size:.8rem}
.card-xs{width:26px;height:38px}
.card-xs .rank{font-size:.44rem;top:1px;left:2px}
.card-xs .suit{font-size:.65rem}
.dpile-face{width:clamp(36px,calc((100vw - 72px) / 7),52px);
  height:calc(clamp(36px,calc((100vw - 72px) / 7),52px) * 1.44);
  border-radius:5px;border:1.5px solid rgba(255,255,255,.25);
  box-shadow:1px 3px 7px rgba(0,0,0,.4);flex-shrink:0}

/* ── HAND ── */
.hand-cards{display:flex;flex-wrap:nowrap;gap:4px;margin-top:5px;
  align-items:flex-end;padding-bottom:16px;overflow-x:hidden;touch-action:pan-x}
.sort-btn{font-size:.56rem;padding:2px 7px;border:1px solid rgba(201,168,76,.35);
  background:transparent;color:rgba(201,168,76,.65);border-radius:3px;cursor:pointer;
  transition:all .15s;font-family:'Playfair Display',serif;letter-spacing:.5px}
.sort-btn:active{background:rgba(201,168,76,.15);color:var(--gold)}
.btn-wrap{position:relative;display:inline-block}
.meld-badge{position:absolute;top:-6px;right:-6px;background:var(--hit);color:#000;
  font-size:.5rem;font-weight:900;border-radius:8px;padding:1px 5px;
  font-family:'Playfair Display',serif;pointer-events:none;animation:badgePop .3s ease}

/* ── ACTION BAR ── */
.act-bar{display:flex;gap:6px;flex-wrap:nowrap;justify-content:center;padding:7px 10px;
  background:rgba(0,0,0,.38);border-top:1px solid rgba(201,168,76,.18);flex-shrink:0}
.btn{padding:10px 14px;border:1px solid var(--gold);background:transparent;color:var(--gold);
  font-family:'Playfair Display',serif;font-size:.76rem;font-weight:700;letter-spacing:.5px;
  border-radius:5px;cursor:pointer;transition:all .15s;min-width:76px}
.btn:active{background:rgba(201,168,76,.18);transform:scale(.94)}
.btn:disabled{border-color:var(--muted);color:var(--muted);cursor:not-allowed;opacity:.42;pointer-events:none;transform:none}
.btn.primary{background:rgba(201,168,76,.15);border-color:var(--gold-l)}
.btn.danger{border-color:var(--err);color:var(--err)}
.btn.danger:active{background:rgba(231,76,60,.15)}
.btn.glow{box-shadow:0 0 12px rgba(201,168,76,.5);border-color:var(--gold-l)}
.btn.glow-green{box-shadow:0 0 14px rgba(46,204,113,.5);border-color:#2ecc71;color:#2ecc71}
.stmsg{text-align:center;font-style:italic;font-size:.82rem;color:var(--muted);
  padding:2px 10px;min-height:22px;flex-shrink:0;transition:all .2s}
.stmsg.ok{color:var(--hit)}.stmsg.err{color:var(--err)}

/* ── OVERLAYS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;
  justify-content:center;z-index:100;padding:20px}
.ov-card{background:var(--felt-l);border:1px solid var(--gold);border-radius:10px;padding:22px;
  max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.7);
  animation:ovIn .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes ovIn{from{opacity:0;transform:scale(.8) translateY(20px)}to{opacity:1;transform:none}}
.ov-emoji{font-size:2.6rem;margin-bottom:4px;animation:winPop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes winPop{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.ov-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--gold);margin-bottom:12px}
.sbreak{text-align:left;margin:8px 0;font-size:.86rem;line-height:2}
.srow{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);padding:2px 0}
.srow.tot{color:var(--gold);font-weight:700;border-bottom:none}

/* ── DISCARD PICKER ── */
.picker-ov{position:fixed;inset:0;background:rgba(0,0,0,.94);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:200;padding:16px}
.ptitle{font-family:'Playfair Display',serif;color:var(--gold);font-size:1rem;margin-bottom:2px;text-align:center}
.psub{font-style:italic;color:var(--muted);font-size:.72rem;text-align:center;margin-bottom:12px;line-height:1.5}
.picker-pile{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:360px;max-height:56vh;overflow-y:auto}
.picker-card-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:transform .1s}
.picker-card-wrap:active{transform:scale(.95)}
.picker-card-wrap .take-label{font-size:.52rem;color:var(--hit);letter-spacing:1px;opacity:0;transition:opacity .15s}
.picker-card-wrap.will-take .take-label{opacity:1}
.picker-card-wrap.will-take .card{border-color:var(--hit);box-shadow:0 0 12px rgba(46,204,113,.5)}

/* ── LANDSCAPE ── */
@media(orientation:landscape) and (max-height:500px){
  .hdr{padding:4px 10px}.score-val{font-size:1.1rem}.prog-bar{display:none}
  .gbody{flex-direction:row;flex-wrap:nowrap;gap:5px;padding:5px;overflow-x:hidden;overflow-y:hidden}
  .zone{min-width:0;flex:1}.pile-area{flex-direction:column;gap:6px;padding:6px 8px}
  .disc-row{max-width:120px;flex-wrap:wrap}.hand-cards{min-height:55px;gap:3px}
  .card{width:36px;height:54px}.card .suit{font-size:.8rem}.card .rank{font-size:.55rem}
  .act-bar{padding:5px}.btn{padding:7px 10px;font-size:.66rem;min-width:60px}
}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px}
</style>
</head>
<body>
<canvas id="fx-canvas"></canvas>

<!-- LOBBY -->
<div id="lobby-screen" class="screen active">
  <div class="logo">Rummy</div>
  <div class="logo-sub">five hundred</div>
  <div class="lobby-sec">
    <div class="lobby-sec-title">Player Names</div>
    <div class="name-row">
      <input class="name-input" id="name-p1" placeholder="Your name" maxlength="12">
      <input class="name-input" id="name-p2" placeholder="Opponent" maxlength="12">
    </div>
  </div>
  <div class="lobby-sec">
    <div class="lobby-sec-title">Game Mode</div>
    <button class="pbtn hi" id="btn-solo">🤖 &nbsp; Solo vs CPU</button>
    <button class="pbtn" id="btn-p1">🂠 &nbsp; Multiplayer — Player 1</button>
    <button class="pbtn" id="btn-p2">🂠 &nbsp; Multiplayer — Player 2</button>
  </div>
  <div class="lobby-sec" style="margin-top:4px">
    <div class="lobby-sec-title">Your Card Back</div>
    <div class="pat-pick" id="pat-pick">
      <div class="pat-opt sel" data-pat="pink"></div>
      <div class="pat-opt" data-pat="teal"></div>
      <div class="pat-opt" data-pat="green"></div>
    </div>
  </div>
  <div class="divider"></div>
  <button class="pbtn sec" id="btn-reset">Reset / New Game</button>
  <div id="lobby-status" class="wait"></div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="hdr">
    <div class="score-blk">
      <div class="score-name" id="p1-name">You</div>
      <div class="score-val" id="p1-score">0</div>
      <div class="prog-bar"><div class="prog-fill" id="p1-prog" style="width:0%"></div></div>
    </div>
    <div style="text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
      <div class="turn-ind" id="turn-ind">...</div>
      <div class="round-badge" id="round-badge"></div>
      <div class="streak-badge" id="streak-badge"></div>
    </div>
    <div class="score-blk">
      <div class="score-name" id="p2-name">CPU</div>

class Particle{
  constructor(x,y,opts={}){
    this.x=x;this.y=y;
    this.vx=(Math.random()-0.5)*(opts.spread||8);
    this.vy=-(Math.random()*6+2)+(opts.up?-4:0);
    this.life=1;this.decay=opts.decay||0.022;
    this.size=opts.size||Math.random()*6+3;
    this.color=opts.color||'#c9a84c';
    this.shape=opts.shape||'circle';
    this.gravity=opts.gravity||0.18;
    this.spin=Math.random()*0.3-0.15;
    this.angle=Math.random()*Math.PI*2;
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=this.gravity;this.vx*=0.97;
    this.life-=this.decay;this.angle+=this.spin;
  }
  draw(ctx){
    ctx.save();ctx.globalAlpha=Math.max(0,this.life);
    ctx.fillStyle=this.color;ctx.strokeStyle=this.color;
    ctx.translate(this.x,this.y);ctx.rotate(this.angle);
    if(this.shape==='circle'){ctx.beginPath();ctx.arc(0,0,this.size/2,0,Math.PI*2);ctx.fill();}
    else if(this.shape==='star'){drawStar(ctx,0,0,this.size/2,this.size/4,5);}
    else if(this.shape==='rect'){ctx.fillRect(-this.size/2,-this.size/3,this.size,this.size/1.5);}
    ctx.restore();
  }
}
function drawStar(ctx,cx,cy,or,ir,pts){
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const r=i%2===0?or:ir;const a=i*Math.PI/pts;
    i===0?ctx.moveTo(cx+r*Math.sin(a),cy-r*Math.cos(a)):ctx.lineTo(cx+r*Math.sin(a),cy-r*Math.cos(a));
  }
  ctx.closePath();ctx.fill();
}
function particleLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.update();p.draw(ctx);});
  requestAnimationFrame(particleLoop);
}
particleLoop();

  burst(x,y,count,colors,opts);
}
function burst(x,y,count,colors,opts={}){
  for(let i=0;i<count;i++){
    const c=colors[Math.floor(Math.random()*colors.length)];
    particles.push(new Particle(x,y,{...opts,color:c}));
  }
}

function tone(freq,dur,vol,type='sine',decay){
  resume();const o=AC.createOscillator(),g=AC.createGain();

  o.start();o.stop(AC.currentTime+dur+d);
}

function render(prev){

  showGame();
  const mh=myHand(),oh=oppHnd(),imt=isMine(),drew=gs.drawnThisTurn,dp=gs.discardPile||[];

  // Scores with floating popups on change

  }
  if(p2s!==prevP2){

    floatScore((delta>0?'+':'')+delta,$('p2-score'),Math.abs(delta)>30,delta<0);
  }
  setScore('p1-score',p1s,p1s!==prevP1);

  $('p1-name').textContent=me===1?myName():oppName();

  $('p1-prog').style.width=Math.min(100,(p1s/500)*100)+'%';

  $('p2-prog').className='prog-fill'+(p2s>=450?' danger':'');
  $('round-badge').textContent=`Round ${gs.roundNum||1}`;

  // Detect new meld laid this render — for combo
  const curMeldCount=(gs.melds||[]).length;
  const myMelds=(gs.melds||[]).filter(m=>m?.player===me).length;
  const prevMyMelds=(normMelds(prev?.melds)).filter(m=>m?.player===me).length;
  if(myMelds>prevMyMelds&&prev){

    registerMeldCombo(0);

  prevMeldCount=curMeldCount;

  // Turn
  const ti=$('turn-ind');
  if(imt){ti.textContent=drew?'Your turn — meld or discard':'Your turn — draw a card';ti.className='turn-ind mine';}
  else if(gs.isCPU){ti.textContent='CPU thinking...';ti.className='turn-ind';}
  else{ti.textContent=`${oppName()}'s turn`;ti.className='turn-ind';}

  // Opp hand
  $('opp-label').textContent=`${oppName()} (${oh.length} cards)`;
  const oc=$('opp-cards');oc.innerHTML='';
  oh.forEach(()=>{const d=document.createElement('div');d.style.cssText=`width:26px;height:40px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,.18);${patCSS(op,8)}`;oc.appendChild(d);});

  // Draw pile
  const dbk=$('draw-back');
  dbk.style.cssText=`width:clamp(36px,calc((100vw - 72px)/7),52px);height:calc(clamp(36px,calc((100vw - 72px)/7),52px) * 1.44);border-radius:5px;border:1.5px solid rgba(255,255,255,.25);box-shadow:1px 3px 7px rgba(0,0,0,.4);flex-shrink:0;${patCSS(mp,12)}`;
  const deckLen=(gs.deck||[]).length;
  $('deck-count').innerHTML=deckLen<=10&&deckLen>0?`<span class="deck-warn">⚠ ${deckLen} left!</span>`:`${deckLen} left`;
  const dw=$('draw-btn');
  imt&&!drew?dw.classList.add('ready'):dw.classList.remove('ready');
  $('draw-btn').style.opacity=(imt&&!drew)?'1':'0.42';

  // Discard
  const dd=$('disc-display');dd.innerHTML='';
  dp.slice(-5).forEach((c,i,a)=>{
    const el=mkCard(c,true);
    el.style.opacity=i<a.length-1?'0.42':'1';
    if(i===a.length-1)el.style.boxShadow='0 0 8px rgba(201,168,76,.35)';
    dd.appendChild(el);
  });
  $('disc-count').textContent=`${dp.length} card${dp.length!==1?'s':''}`;
  const hist=$('hist-row');hist.innerHTML='';
  (gs.discardHistory||[]).slice(-8).forEach(c=>hist.appendChild(mkCard(c,false,false,'xs')));

  // Melds + hand
  sel=sel.filter(i=>i<mh.length);
  const selCards=sel.map(i=>mh[i]);
  renderMelds(selCards);
  renderHand(prev,selCards);

  // Buttons
  const noAct=!imt||!drew;
  const hasMeld=!noAct&&sel.length>=3&&validMeld(selCards);
  const hasAdd=!noAct&&sel.length>0&&tgt!==null;
  const hasDisc=!noAct&&sel.length===1;
  $('btn-meld').disabled=noAct;$('btn-meld').className='btn'+(hasMeld?' glow-green':'');
  $('btn-add').disabled=noAct;$('btn-add').className='btn'+(hasAdd?' glow':'');
  $('btn-disc').disabled=noAct;$('btn-disc').className='btn danger'+(hasDisc?' glow':'');
  $('take-btn').disabled=!isMine()||!!(gs.drawnThisTurn)||!(gs.discardPile||[]).length;
  $('meld-badge').style.display=(!noAct&&hasMeldInHand(mh))?'block':'none';

  if(gs.phase==='roundover'){renderRoundOv();$('round-ov').style.display='flex';}
  else $('round-ov').style.display='none';
  if(gs.phase==='gameover'){renderGameOv();$('go-ov').style.display='flex';}
  else $('go-ov').style.display='none';
}

function syncHandOrder(){
  const hand=myHand();
  const existing=handOrder.filter(i=>i<hand.length);
  const missing=[...Array(hand.length).keys()].filter(i=>!existing.includes(i));
  handOrder=[...existing,...missing];
}

function renderHand(prev,selCards){
  syncHandOrder();
  const cont=$('my-hand');cont.innerHTML='';
  const hand=myHand();
  const prevLen=prev?(me===1?prev.p1Hand:prev.p2Hand)?.length||0:hand.length;
  const newCard=hand.length>prevLen;
  const selIsValid=selCards.length>=3&&validMeld(selCards);

  let displayOrder;
  if(sortMode){
    displayOrder=[...hand.map((c,i)=>({c,i}))]
      .sort((a,b)=>SUITS.indexOf(a.c.suit)-SUITS.indexOf(b.c.suit)||ri(a.c.rank)-ri(b.c.rank));
  } else {
    displayOrder=handOrder.map(i=>({c:hand[i],i}));
  }

  let dragSrcDi=null;

  displayOrder.forEach(({c,i:origIdx},di)=>{
    const isSel=sel.includes(origIdx);
    const el=mkCard(c,false,newCard&&origIdx===hand.length-1);
    if(newCard&&origIdx===hand.length-1)el.style.animationDelay='0s';
    if(isSel)el.classList.add(selIsValid?'valid-sel':'sel');
    el.dataset.di=String(di);

    let touchMoved=false,touchStartX=0,touchStartY=0,longPressTimer=null,isDragging=false;

    el.addEventListener('touchstart',e=>{
      touchMoved=false;isDragging=false;
      touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;
      longPressTimer=setTimeout(()=>{
        isDragging=true;dragSrcDi=di;
        el.classList.add('drag-ghost');vibrate(30);
      },280);
    },{passive:true});

    el.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-touchStartX,dy=e.touches[0].clientY-touchStartY;
      if(Math.abs(dx)>6||Math.abs(dy)>6)touchMoved=true;
      if(!isDragging){clearTimeout(longPressTimer);return;}
      const t=e.touches[0];
      const over=document.elementsFromPoint(t.clientX,t.clientY).find(x=>x.classList.contains('card')&&x!==el);
      cont.querySelectorAll('.card').forEach(c=>c.classList.remove('drag-target'));
      if(over)over.classList.add('drag-target');
    },{passive:true});

    el.addEventListener('touchend',e=>{
      clearTimeout(longPressTimer);
      el.classList.remove('drag-ghost');
      cont.querySelectorAll('.card').forEach(c=>c.classList.remove('drag-target'));
      if(isDragging&&dragSrcDi!==null){
        const t=e.changedTouches[0];
        const over=document.elementsFromPoint(t.clientX,t.clientY).find(x=>x.classList.contains('card')&&x!==el);
        if(over){
          const tgtDi=parseInt(over.dataset.di);
          if(!isNaN(tgtDi)&&tgtDi!==dragSrcDi){
            const srcOrig=displayOrder[dragSrcDi].i,tgtOrig=displayOrder[tgtDi].i;
            const sp=handOrder.indexOf(srcOrig),tp=handOrder.indexOf(tgtOrig);
            handOrder.splice(sp,1);handOrder.splice(tp,0,srcOrig);
            sortMode=false;$('sort-btn').textContent='A→K';
          }
        }
        dragSrcDi=null;
        renderHand(null,sel.map(i=>myHand()[i]));return;
      }
      if(!touchMoved){
        vibrate(18);
        const x=sel.indexOf(origIdx);
        if(x===-1){sel.push(origIdx);sndSelect();}else{sel.splice(x,1);sndDeselect();}
        const newSel=sel.map(i=>myHand()[i]);
        if(newSel.length>=3&&validMeld(newSel))sndValidSel();
        renderHand(null,sel.map(i=>myHand()[i]));updateGlows();
      }
    },{passive:true});

    el.addEventListener('click',()=>{
      if(isDragging)return;
      vibrate(18);
      const x=sel.indexOf(origIdx);
      if(x===-1){sel.push(origIdx);sndSelect();}else{sel.splice(x,1);sndDeselect();}
      const newSel=sel.map(i=>myHand()[i]);
      if(newSel.length>=3&&validMeld(newSel))sndValidSel();
      renderHand(null,sel.map(i=>myHand()[i]));updateGlows();
    });

    cont.appendChild(el);
  });
}

function updateGlows(){
  const mh=myHand(),selCards=sel.map(i=>mh[i]);
  const noAct=!isMine()||!gs?.drawnThisTurn;
  const hasMeld=!noAct&&sel.length>=3&&validMeld(selCards);
  const hasAdd=!noAct&&sel.length>0&&tgt!==null;
  const hasDisc=!noAct&&sel.length===1;
  $('btn-meld').className='btn'+(hasMeld?' glow-green':'');
  $('btn-add').className='btn'+(hasAdd?' glow':'');

}

function validMeld(cards){
  if(cards.length<3)return false;
  if(cards.every(c=>c.rank===cards[0].rank))return new Set(cards.map(c=>c.suit)).size===cards.length;
  if(cards.every(c=>c.suit===cards[0].suit)){
    const s=[...cards].sort((a,b)=>ri(a.rank)-ri(b.rank));
    for(let i=1;i<s.length;i++)if(ri(s[i].rank)!==ri(s[i-1].rank)+1)return false;
    return true;
  }
  return false;
}

function calcRoundEnd(patch){
  const melds=patch.melds||gs.melds||[];
  const p1h=patch.p1Hand!==undefined?patch.p1Hand:(gs.p1Hand||[]);
  const p2h=patch.p2Hand!==undefined?patch.p2Hand:(gs.p2Hand||[]);
  const p1M=melds.filter(m=>m?.player===1).reduce((s,m)=>s+m.cards.reduce((a,c)=>a+cval(c),0),0);
  const p2M=melds.filter(m=>m?.player===2).reduce((s,m)=>s+m.cards.reduce((a,c)=>a+cval(c),0),0);
  const p1P=p1h.reduce((s,c)=>s+cval(c),0),p2P=p2h.reduce((s,c)=>s+cval(c),0);
  const p1R=p1M-p1P,p2R=p2M-p2P;
  const p1s=(gs.p1Score||0)+p1R,p2s=(gs.p2Score||0)+p2R;
  return{phase:(p1s>=500||p2s>=500)?'gameover':'roundover',p1Score:p1s,p2Score:p2s,
    lastRound:{p1Melds:p1M,p1Pen:p1P,p1Round:p1R,p2Melds:p2M,p2Pen:p2P,p2Round:p2R}};
}

async function layMeld(){
  if(!isMine())return st('Not your turn.','err');
  if(!gs.drawnThisTurn)return st('Draw first.','err');
  if(sel.length<3)return st('Select 3+ cards.','err');
  const hand=[...myHand()];const toMeld=sel.map(i=>hand[i]);
  if(!validMeld(toMeld)){sndError();fxScreenShake();return st('Not a valid meld.','err');}

  const pts=toMeld.reduce((s,c)=>s+cval(c),0);
  const isBig=pts>=30||toMeld.length>=4;

  vibrate(isBig?[30,20,30,20,30]:[25,15,25]);
  if(isBig)sndBigMeld();else sndMeld();
  fxBgPulse();

  const sorted=[...sel].sort((a,b)=>b-a);sorted.forEach(i=>hand.splice(i,1));
  const melds=[...(gs.melds||[]),{cards:toMeld,player:me}];
  const patch={[myKey()]:hand,melds};
  if(!hand.length)Object.assign(patch,calcRoundEnd(patch));
  await dbUp(patch);sel=[];tgt=null;

  // Particles + flash after DOM updates
  setTimeout(()=>{
    const grid=$('melds-grid');const last=grid.lastElementChild;
    if(last){
      last.classList.add('flash');
      fxMeld(last);
      setTimeout(()=>last.classList.remove('flash'),650);
    }
    // Shine effect on melded cards
    last?.querySelectorAll('.card').forEach((c,i)=>{
      setTimeout(()=>{c.classList.add('shine');setTimeout(()=>c.classList.remove('shine'),400);},i*40);
    });
    // Combo check
    comboCount++;updateStreakBadge();
    if(comboCount>=2){sndCombo(comboCount);showCombo(comboCount===2?'Double Meld! 🔥':comboCount===3?'Triple! 🔥🔥':`🔥 x${comboCount} Combo!`,`+${pts} pts`);}
    floatScore(`+${pts}`,$('p1-score'),isBig);
  },80);

  st(isBig?'Big meld! 🃏🃏':'Meld! 🃏','ok');
}

async function addToMeld(){
  if(!isMine())return st('Not your turn.','err');
  if(!gs.drawnThisTurn)return st('Draw first.','err');
  if(!sel.length)return st('Select cards to add.','err');
  if(tgt===null)return st('Tap a meld to target it.','err');

async function discardCard(){
  if(!isMine())return st('Not your turn.','err');
  if(!gs.drawnThisTurn)return st('Draw first.','err');
  if(sel.length!==1){sndError();fxScreenShake();return st('Select exactly 1 card.','err');}

function scheduleCPU(){clearTimeout(cpuTmr);cpuTmr=setTimeout(cpuTurn,600);}
async function cpuTurn(){
  if(!gs||gs.phase!=='playing'||gs.currentTurn===me||!isCPU)return;
  const ck=oppKey();let hand=[...(gs[ck]||[])];
  const melds=normMelds(gs.melds);const dp=[...(gs.discardPile||[])];
  let drew=false;
  if(dp.length>0){
    const top=dp[dp.length-1];
    if(cpuFindMeld([...hand,top])||cpuCanExtend(melds,top)){
      dp.pop();hand=[...hand,top];
      await dbUp({discardPile:dp.length?dp:null,[ck]:hand,drawnThisTurn:true});drew=true;
    }
  }
  if(!drew){
    const deck=[...(gs.deck||[])];
    if(!deck.length){const p={[ck]:hand};Object.assign(p,calcRoundEnd({...gs,[ck]:hand}));await dbUp(p);return;}
    const drawn=deck.pop();hand=[...hand,drawn];
    await dbUp({deck,[ck]:hand,drawnThisTurn:true});
  }
  const snap=await get(ref(fdb,GR));const g=snap.val();
  if(!g||g.currentTurn===me)return;
  hand=[...(g[ck]||[])];const curMelds=normMelds(g.melds);let madeChanges=false;
  let meldIdxs=cpuFindMeld(hand);
  while(meldIdxs&&hand.length>1){
    const cards=meldIdxs.map(i=>hand[i]);
    [...meldIdxs].sort((a,b)=>b-a).forEach(i=>hand.splice(i,1));
    curMelds.push({cards,player:cpuNum()});madeChanges=true;meldIdxs=cpuFindMeld(hand);
  }
  let extended=true;
  while(extended){extended=false;
    for(let i=0;i<hand.length;i++){
      for(let mi=0;mi<curMelds.length;mi++){
        const m=curMelds[mi];if(!m)continue;
        if(validMeld([...m.cards,hand[i]])){curMelds[mi]={...m,cards:[...m.cards,hand[i]]};hand.splice(i,1);extended=true;madeChanges=true;break;}
      }if(extended)break;
    }
  }
  if(!hand.length){
    const p={[ck]:hand,melds:madeChanges?curMelds:undefined};
    if('melds'in p&&!p.melds?.length)p.melds=null;
    Object.assign(p,calcRoundEnd({...g,[ck]:hand,melds:curMelds}));await dbUp(p);return;
  }
  const wi=cpuChooseDiscard(hand,curMelds);const[discarded]=hand.splice(wi,1);
  const newDp=[...(g.discardPile||[]),discarded];
  const newHist=[...(g.discardHistory||[]),discarded].slice(-20);
  const fp={[ck]:hand,discardPile:newDp,discardHistory:newHist,drawnThisTurn:false,currentTurn:me};
  if(madeChanges)fp.melds=curMelds.length?curMelds:null;
  if(!hand.length)Object.assign(fp,calcRoundEnd({...g,[ck]:hand,melds:curMelds}));
  await dbUp(fp);
}
function cpuFindMeld(hand){
  const byR={};hand.forEach((c,i)=>{(byR[c.rank]=byR[c.rank]||[]).push(i);});
  for(const r in byR){const idxs=byR[r];if(idxs.length>=3){const cards=idxs.map(i=>hand[i]);if(validMeld(cards))return idxs;}}
  const byS={};hand.forEach((c,i)=>{(byS[c.suit]=byS[c.suit]||[]).push({c,i});});
  for(const s in byS){
    const items=byS[s].sort((a,b)=>ri(a.c.rank)-ri(b.c.rank));let run=[items[0]];
    for(let k=1;k<items.length;k++){
      if(ri(items[k].c.rank)===ri(run[run.length-1].c.rank)+1)run.push(items[k]);
      else{if(run.length>=3)return run.map(x=>x.i);run=[items[k]];}
    }
    if(run.length>=3)return run.map(x=>x.i);
  }
  return null;
}
function cpuCanExtend(melds,card){return melds.some(m=>m&&validMeld([...m.cards,card]));}
function cpuChooseDiscard(hand,melds){
  let wi=0,ws=-9999;
  hand.forEach((c,i)=>{
    let syn=0;
    hand.forEach((c2,j)=>{if(i===j)return;if(c2.rank===c.rank)syn+=5;if(c2.suit===c.suit&&Math.abs(ri(c2.rank)-ri(c.rank))<=2)syn+=3;});
    melds.forEach(m=>{if(m&&validMeld([...m.cards,c]))syn+=10;});
    const score=cval(c)-syn;if(score>ws){ws=score;wi=i;}
  });
  return wi;
}
